<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L — Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased">

  <!-- NAV -->
  <nav class="flex items-center justify-between px-8 py-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur z-50">
    <span class="text-2xl font-display font-bold tracking-tight">
      <a href="index.html">L</a>
    </span>
    <div class="flex items-center gap-3">
      <a href="login.html" title="Sign in">
        <button class="px-4 py-1.5 text-sm rounded border border-gray-300 hover:border-gray-700 transition-colors">Sign in</button>
      </a>
      <a href="register.html" title="Register">
        <button class="px-4 py-1.5 text-sm rounded bg-gray-900 text-white hover:bg-black transition-colors">Register</button>
      </a>
      <a href="cart.html" title="Cart">
        <button class="relative ml-1 p-1.5 rounded hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m12-9l2 9M9 21a1 1 0 100-2 1 1 0 000 2zm6 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span class="absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-medium">2</span>
        </button>
      </a>
    </div>
  </nav>

  <!-- FORM -->
  <div class="max-w-2xl mx-auto px-6 py-10 pb-32">
    <div class="space-y-5">

      <div>
        <label class="block text-sm text-gray-600 mb-1.5">First name</label>
        <input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors placeholder-transparent"/>
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1.5">Last name</label>
        <input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors placeholder-transparent"/>
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1.5">Phone number</label>
        <input type="tel" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors placeholder-transparent"/>
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1.5">Email address</label>
        <input type="email" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors placeholder-transparent"/>
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1.5">Address</label>
        <input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors placeholder-transparent"/>
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1.5">Postal code</label>
        <input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors placeholder-transparent"/>
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1.5">City</label>
        <input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors placeholder-transparent"/>
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1.5">Country</label>
        <input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors placeholder-transparent"/>
      </div>

    </div>
  </div>

  <!-- FIXED DONE BUTTON -->
  <div class="fixed bottom-0 left-0 right-0 bg-gray-900">
    <a href="cart_success.html">
      <button class="w-full py-4 text-white text-sm font-semibold tracking-wide hover:bg-black transition-colors">
        Done
      </button>
    </a>
  </div>

</body>
</html>
