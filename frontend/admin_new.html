<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L — New Product</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .font-display { font-family: 'Montserrat', sans-serif; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased">

  <nav class="flex items-center justify-between px-8 py-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur z-50">
    <span class="text-2xl font-display font-bold tracking-tight">
      <a href="index.html">L</a>
    </span>
    <div class="flex items-center gap-3">
      <a href="admin_manage.html">
        <button class="px-4 py-1.5 text-sm rounded border border-gray-300 hover:border-gray-700 transition-colors">Product management</button>
      </a>
      <a href="admin_new.html">
        <button class="px-4 py-1.5 text-sm rounded bg-gray-900 text-white hover:bg-black transition-colors">New product</button>
      </a>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-10 pb-32">
    <div class="mb-8">
      <h1 class="text-2xl font-bold">Create product</h1>
      <p class="text-sm text-gray-500 mt-1">Uploads go directly to the admin product API.</p>
    </div>

    <div id="formMessage" class="hidden mb-6 rounded-2xl border px-4 py-3 text-sm"></div>

    <form id="productForm" class="space-y-6">
      <section class="border border-gray-200 rounded-2xl p-5">
        <h2 class="text-sm font-semibold mb-4">Main information</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="sm:col-span-2">
            <label for="nameInput" class="block text-sm text-gray-600 mb-1.5">Name</label>
            <input id="nameInput" type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors"/>
          </div>
          <div class="sm:col-span-2">
            <label for="descriptionInput" class="block text-sm text-gray-600 mb-1.5">Description</label>
            <textarea id="descriptionInput" rows="5" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors resize-y"></textarea>
          </div>
          <div>
            <label for="typeInput" class="block text-sm text-gray-600 mb-1.5">Type</label>
            <select id="typeInput" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors bg-white">
              <option value="DIGITAL">Digital</option>
              <option value="PHYSICAL">Physical</option>
            </select>
          </div>
          <div>
            <label for="priceInput" class="block text-sm text-gray-600 mb-1.5">Price (EUR)</label>
            <input id="priceInput" type="number" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors"/>
          </div>
          <div>
            <label for="stockInput" class="block text-sm text-gray-600 mb-1.5">Stock</label>
            <input id="stockInput" type="number" min="0" step="1" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors"/>
          </div>
          <div class="flex items-center gap-3 pt-8">
            <input id="activeInput" type="checkbox" checked class="w-4 h-4 accent-gray-900"/>
            <label for="activeInput" class="text-sm text-gray-700">Visible in storefront</label>
          </div>
        </div>
      </section>

      <section class="border border-gray-200 rounded-2xl p-5">
        <h2 class="text-sm font-semibold mb-4">References</h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div>
            <p class="text-sm text-gray-600 mb-3">Categories</p>
            <div id="categoryOptions" class="space-y-2 text-sm text-gray-700"></div>
          </div>
          <div>
            <p class="text-sm text-gray-600 mb-3">Platforms</p>
            <div id="platformOptions" class="space-y-2 text-sm text-gray-700"></div>
          </div>
        </div>
      </section>

      <section class="border border-gray-200 rounded-2xl p-5">
        <h2 class="text-sm font-semibold mb-4">Images</h2>
        <label for="imagesInput" class="inline-flex items-center justify-center px-4 py-3 rounded-xl border border-gray-200 text-sm font-medium text-gray-700 hover:border-gray-400 transition-colors cursor-pointer">
          Select at least 2 images
        </label>
        <input id="imagesInput" type="file" accept="image/png,image/jpeg,image/webp" multiple class="hidden"/>
        <div id="imagePreview" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4"></div>
      </section>
    </form>
  </main>

  <div class="fixed bottom-0 left-0 right-0 px-6 pb-6 bg-white pt-2 border-t border-gray-100">
    <div class="max-w-4xl mx-auto flex flex-col sm:flex-row gap-3">
      <a href="admin_manage.html" class="flex-1 inline-flex items-center justify-center py-4 rounded-xl border border-gray-200 text-sm font-semibold text-gray-700 hover:border-gray-400 transition-colors">Cancel</a>
      <button id="submitButton" form="productForm" type="submit" class="flex-1 py-4 bg-gray-900 text-white text-sm font-semibold rounded-xl hover:bg-black transition-colors">
        Create product
      </button>
    </div>
  </div>

  <script src="store_data.js"></script>
  <script>
    (() => {
      const store = window.StoreMvp;
      if (!store) return;

      const productForm = document.getElementById('productForm');
      const formMessage = document.getElementById('formMessage');
      const categoryOptions = document.getElementById('categoryOptions');
      const platformOptions = document.getElementById('platformOptions');
      const imagesInput = document.getElementById('imagesInput');
      const imagePreview = document.getElementById('imagePreview');
      const submitButton = document.getElementById('submitButton');

      const nameInput = document.getElementById('nameInput');
      const descriptionInput = document.getElementById('descriptionInput');
      const typeInput = document.getElementById('typeInput');
      const priceInput = document.getElementById('priceInput');
      const stockInput = document.getElementById('stockInput');
      const activeInput = document.getElementById('activeInput');

      const setMessage = (text, type = 'error') => {
        if (!text) {
          formMessage.textContent = '';
          formMessage.className = 'hidden mb-6 rounded-2xl border px-4 py-3 text-sm';
          return;
        }

        formMessage.textContent = text;
        formMessage.className =
          type === 'success'
            ? 'mb-6 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800'
            : type === 'info'
              ? 'mb-6 rounded-2xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-sky-800'
              : 'mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700';
      };

      const setLoading = (isLoading) => {
        submitButton.disabled = isLoading;
        submitButton.textContent = isLoading ? 'Creating product...' : 'Create product';
        submitButton.classList.toggle('opacity-60', isLoading);
        submitButton.classList.toggle('cursor-not-allowed', isLoading);
      };

      const renderReferenceGroup = (container, name, items) => {
        container.innerHTML = items.map((item) => `
          <label class="flex items-center gap-2.5 cursor-pointer">
            <input type="checkbox" name="${name}" value="${item.id}" class="w-4 h-4 accent-gray-900"/>
            <span>${store.escapeHtml(item.name)}</span>
          </label>
        `).join('');
      };

      const renderImagePreview = () => {
        const files = Array.from(imagesInput.files || []);

        if (files.length === 0) {
          imagePreview.innerHTML = '<p class="text-sm text-gray-400 col-span-full">No images selected yet.</p>';
          return;
        }

        imagePreview.innerHTML = files.map((file) => `
          <div class="rounded-2xl overflow-hidden border border-gray-200 bg-gray-50">
            <img src="${URL.createObjectURL(file)}" alt="${store.escapeHtml(file.name)}" class="w-full h-28 object-cover"/>
            <div class="px-3 py-2 text-xs text-gray-500 truncate">${store.escapeHtml(file.name)}</div>
          </div>
        `).join('');
      };

      const selectedIds = (name) => {
        return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`))
          .map((input) => input.value)
          .filter(Boolean);
      };

      const buildFormData = () => {
        const categoryIds = selectedIds('category_ids');
        const platformIds = selectedIds('platform_ids');
        const files = Array.from(imagesInput.files || []);

        if (categoryIds.length === 0) {
          throw new Error('Select at least one category.');
        }
        if (platformIds.length === 0) {
          throw new Error('Select at least one platform.');
        }
        if (files.length < 2) {
          throw new Error('Select at least 2 images.');
        }

        const formData = new FormData();
        formData.append('name', nameInput.value.trim());
        formData.append('description', descriptionInput.value.trim());
        formData.append('type', typeInput.value);
        formData.append('price', priceInput.value);
        formData.append('stock', stockInput.value);
        formData.append('is_active', activeInput.checked ? '1' : '0');

        categoryIds.forEach((id) => formData.append('category_ids[]', id));
        platformIds.forEach((id) => formData.append('platform_ids[]', id));
        files.forEach((file) => formData.append('images[]', file));

        return formData;
      };

      imagesInput.addEventListener('change', renderImagePreview);

      productForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        setMessage('');

        let formData;

        try {
          formData = buildFormData();
        } catch (error) {
          setMessage(error.message);
          return;
        }

        setLoading(true);

        try {
          const response = await store.createAdminProduct(formData);
          const product = response?.data;

          setMessage('Product created successfully.', 'success');

          window.setTimeout(() => {
            window.location.assign(`admin_edit.html?id=${encodeURIComponent(product.id)}`);
          }, 300);
        } catch (error) {
          setMessage(store.firstError(error.payload, 'Unable to create product right now.'));
        } finally {
          setLoading(false);
        }
      });

      const loadReferences = async () => {
        setMessage('Loading references...', 'info');

        try {
          const payload = await store.fetchAdminReferences();
          renderReferenceGroup(categoryOptions, 'category_ids', payload.categories || []);
          renderReferenceGroup(platformOptions, 'platform_ids', payload.platforms || []);
          renderImagePreview();
          setMessage('');
        } catch (error) {
          setMessage(store.firstError(error.payload, 'Unable to load categories and platforms.'));
        }
      };

      loadReferences();
    })();
  </script>

</body>
</html>
