<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L — Order Confirmed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased min-h-screen flex flex-col">

  <!-- NAV -->
  <nav class="flex items-center justify-between px-8 py-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur z-50">
    <span class="text-2xl font-display font-bold tracking-tight">
      <a href="index.html">L</a>
    </span>
    <div class="flex items-center gap-3">
      <a href="login.html" title="Sign in">
        <button class="px-4 py-1.5 text-sm rounded border border-gray-300 hover:border-gray-700 transition-colors">Sign in</button>
      </a>
      <a href="register.html" title="Register">
        <button class="px-4 py-1.5 text-sm rounded bg-gray-900 text-white hover:bg-black transition-colors">Register</button>
      </a>
      <a href="cart.html" title="Cart">
        <button class="relative ml-1 p-1.5 rounded hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m12-9l2 9M9 21a1 1 0 100-2 1 1 0 000 2zm6 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span class="absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-medium">2</span>
        </button>
      </a>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="flex-1 flex flex-col justify-between px-8 py-10 max-w-2xl w-full">

    <div>
      <h1 class="text-xl font-semibold text-center mb-14">Thank you for your purchase!</h1>

      <div class="space-y-4">
        <p class="text-sm text-gray-700">
          Your order number is <span class="font-bold text-gray-900">31415926</span>
        </p>
        <p class="text-sm text-gray-700">
          Estimated delivery time by <span class="font-bold text-gray-900">Mon, April 5th</span>
        </p>
        <p class="text-sm text-gray-700">
          You will receive an email at <span class="font-semibold text-gray-900">jondoe@mymail.com</span>
        </p>
      </div>

      <p class="text-sm text-gray-500 mt-10">
        To change or cancel order go to <a href="#" class="underline text-gray-700 hover:text-gray-900 transition-colors">Order History</a>
      </p>
    </div>

  </div>

  <!-- BOTTOM BUTTON -->
  <div class="px-8 pb-10 max-w-2xl w-full">
    <a href="shop.html">
      <button class="w-full py-4 bg-gray-900 text-white text-sm font-semibold rounded-xl hover:bg-black transition-colors">
        Go back to shop
      </button>
    </a>
  </div>

</body>
</html>
