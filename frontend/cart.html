<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L — Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .font-display { font-family: 'Montserrat', sans-serif; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] { -moz-appearance: textfield; appearance: textfield;}
  </style>
</head>
<body class="bg-white text-gray-900 antialiased">

  <nav class="flex items-center justify-between px-8 py-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur z-50">
    <span class="text-2xl font-display font-bold tracking-tight">
      <a href="index.html">L</a>
    </span>
    <div class="flex items-center gap-3">
      <a href="login.html" title="Sign in">
        <button class="px-4 py-1.5 text-sm rounded border border-gray-300 hover:border-gray-700 transition-colors">Sign in</button>
      </a>
      <a href="register.html" title="Register">
        <button class="px-4 py-1.5 text-sm rounded bg-gray-900 text-white hover:bg-black transition-colors">Register</button>
      </a>
      <a href="cart.html" title="Cart">
        <button class="relative ml-1 p-1.5 rounded hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m12-9l2 9M9 21a1 1 0 100-2 1 1 0 000 2zm6 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span id="cartCountBadge" class="hidden absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] min-w-4 h-4 px-1 rounded-full flex items-center justify-center font-medium">0</span>
        </button>
      </a>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 pb-32">
    <div class="pt-5 pb-2">
      <h1 class="text-xl font-display font-bold">Your Cart</h1>
      <p class="text-sm text-gray-500 mt-1">Product data is loaded from the live catalog. Quantity changes are stored locally until checkout.</p>
    </div>

    <div id="cartMessage" class="hidden mb-4 rounded-2xl border px-4 py-3 text-sm"></div>
    <div id="cartItems" class="border-t border-gray-100"></div>

    <div id="emptyCartState" class="hidden py-12 text-center border-t border-b border-gray-100 mt-3">
      <p class="text-sm text-gray-600">Your cart is empty.</p>
      <a href="shop.html" class="inline-block mt-4 px-5 py-2 rounded-lg bg-gray-900 text-white text-sm font-semibold hover:bg-black transition-colors">Go to shop</a>
    </div>

    <div id="cartSummary" class="py-5 space-y-2.5 pb-10">
      <div class="flex justify-between text-sm">
        <span class="text-gray-500">Number of products</span>
        <span id="summaryProducts" class="font-medium">0</span>
      </div>
      <div class="flex justify-between text-sm">
        <span class="text-gray-500">Subtotal</span>
        <span id="summarySubtotal" class="font-medium">€0.00</span>
      </div>
      <div class="flex justify-between text-sm">
        <span class="text-gray-500">Shipping</span>
        <span class="font-semibold">Calculated at checkout</span>
      </div>
      <div class="flex justify-between text-sm pt-2 border-t border-gray-100">
        <span class="font-medium">Estimated total</span>
        <span id="summaryTotal" class="font-bold">€0.00</span>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-gray-900">
    <a id="orderButton" href="cart_order.html" class="block w-full py-4 text-center text-white text-sm font-semibold tracking-wide hover:bg-black transition-colors">Continue to checkout</a>
  </div>

  <script src="store_data.js"></script>
  <script src="/auth_ui.js"></script>
  <script>
    (() => {
      const store = window.StoreMvp;
      if (!store) return;

      const cartItemsElement = document.getElementById('cartItems');
      const emptyCartState = document.getElementById('emptyCartState');
      const cartSummary = document.getElementById('cartSummary');
      const summaryProducts = document.getElementById('summaryProducts');
      const summarySubtotal = document.getElementById('summarySubtotal');
      const summaryTotal = document.getElementById('summaryTotal');
      const cartCountBadge = document.getElementById('cartCountBadge');
      const orderButton = document.getElementById('orderButton');
      const cartMessage = document.getElementById('cartMessage');

      let cart = store.readCart();
      let productsById = new Map();

      const setMessage = (text, type = 'error') => {
        if (!text) {
          cartMessage.textContent = '';
          cartMessage.className = 'hidden mb-4 rounded-2xl border px-4 py-3 text-sm';
          return;
        }

        cartMessage.textContent = text;
        cartMessage.className =
          type === 'info'
            ? 'mb-4 rounded-2xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-sky-800'
            : 'mb-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700';
      };

      const updateBadge = () => {
        const count = store.getCartCount(cart);
        cartCountBadge.textContent = count > 99 ? '99+' : String(count);
        cartCountBadge.classList.toggle('hidden', count === 0);
      };

      const updateOrderButton = (hasItems) => {
        if (hasItems) {
          orderButton.setAttribute('href', 'cart_order.html');
          orderButton.classList.remove('pointer-events-none', 'opacity-60');
          orderButton.removeAttribute('aria-disabled');
        } else {
          orderButton.removeAttribute('href');
          orderButton.classList.add('pointer-events-none', 'opacity-60');
          orderButton.setAttribute('aria-disabled', 'true');
        }
      };

      const buildItems = () => {
        return store.getCartEntries(cart)
          .map((entry) => {
            const product = productsById.get(entry.productId);
            if (!product) return null;

            return {
              product,
              quantity: entry.quantity,
            };
          })
          .filter(Boolean);
      };

      const renderItems = () => {
        const items = buildItems();

        if (items.length === 0) {
          cartItemsElement.innerHTML = '';
          emptyCartState.classList.remove('hidden');
          cartSummary.classList.add('hidden');
          updateOrderButton(false);
          updateBadge();
          return;
        }

        emptyCartState.classList.add('hidden');
        cartSummary.classList.remove('hidden');
        updateOrderButton(true);

        cartItemsElement.innerHTML = items.map(({ product, quantity }) => {
          const lineTotal = store.formatMoney(product.price * quantity, product.currency);

          return `
            <article class="py-5 border-b border-gray-100" data-product-id="${product.id}">
              <div class="flex gap-4">
                <div class="w-24 h-24 rounded-xl bg-gray-100 overflow-hidden shrink-0">
                  <img src="${store.productImage(product, product.name)}" alt="${store.escapeHtml(product.name)} cover" class="w-full h-full object-cover" loading="lazy"/>
                </div>

                <div class="flex-1 min-w-0">
                  <div class="flex items-start justify-between gap-3">
                    <div>
                      <a href="product_details.html?slug=${encodeURIComponent(product.slug)}" class="text-sm font-semibold leading-tight hover:underline">${store.escapeHtml(product.name)}</a>
                      <p class="text-xs text-gray-400 mt-1">${store.escapeHtml(store.productCategoryLabel(product))} · ${store.escapeHtml(store.productPlatformLabel(product))}</p>
                    </div>
                    <button data-remove-id="${product.id}" class="w-8 h-8 rounded-full border border-gray-200 text-gray-500 hover:bg-gray-50 hover:border-gray-300 transition-colors" title="Remove product" aria-label="Remove product">×</button>
                  </div>

                  <p class="text-xs text-gray-400 mt-2 leading-relaxed">${store.escapeHtml(product.description || 'No description provided.')}</p>

                  <div class="flex items-center justify-between mt-3">
                    <p class="text-sm font-semibold">${store.formatMoney(product.price, product.currency)}</p>
                    <p class="text-xs text-gray-500">Line total: <span class="font-semibold text-gray-700">${lineTotal}</span></p>
                  </div>
                </div>
              </div>

              <div class="flex items-center justify-between px-0 py-2.5 mt-2">
                <span class="text-[10px] tracking-widest uppercase text-gray-400 font-medium">Quantity</span>
                <div class="flex items-center gap-2">
                  <button data-dec-id="${product.id}" class="w-8 h-8 rounded-full border border-gray-200 text-gray-700 hover:border-gray-400 hover:bg-gray-50 flex items-center justify-center" aria-label="Decrease quantity">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 12H6"/></svg>
                  </button>
                  <input data-qty-input-id="${product.id}" type="number" min="0" step="1" value="${quantity}" class="w-14 h-8 rounded-md border border-gray-200 text-sm font-semibold text-center focus:outline-none focus:border-gray-400" aria-label="Product quantity"/>
                  <button data-inc-id="${product.id}" class="w-8 h-8 rounded-full border border-gray-200 text-gray-700 hover:border-gray-400 hover:bg-gray-50 flex items-center justify-center" aria-label="Increase quantity">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12M18 12H6"/></svg>
                  </button>
                </div>
              </div>
            </article>
          `;
        }).join('');

        const totalCount = items.reduce((sum, item) => sum + item.quantity, 0);
        const subtotal = items.reduce((sum, item) => sum + (Number(item.product.price) * item.quantity), 0);
        const currency = items[0]?.product?.currency || 'EUR';

        summaryProducts.textContent = String(totalCount);
        summarySubtotal.textContent = store.formatMoney(subtotal, currency);
        summaryTotal.textContent = store.formatMoney(subtotal, currency);

        updateBadge();
      };

      const loadProducts = async () => {
        const entries = store.getCartEntries(cart);
        const ids = entries.map((entry) => entry.productId);

        if (ids.length === 0) {
          productsById = new Map();
          renderItems();
          return;
        }

        setMessage('Refreshing cart from catalog...', 'info');

        try {
          const products = await store.fetchCatalogProductsByIds(ids);
          productsById = new Map(products.map((product) => [String(product.id), product]));

          const availableIds = new Set(products.map((product) => String(product.id)));
          const sanitized = {};

          entries.forEach((entry) => {
            if (availableIds.has(String(entry.productId))) {
              sanitized[String(entry.productId)] = entry.quantity;
            }
          });

          cart = store.writeCart(sanitized);
          setMessage('');
          renderItems();
        } catch (error) {
          setMessage(store.firstError(error.payload, 'Unable to load cart products right now.'));
        }
      };

      cartItemsElement.addEventListener('click', (event) => {
        const incButton = event.target.closest('[data-inc-id]');
        if (incButton) {
          cart = store.changeItemQty(incButton.dataset.incId, 1);
          renderItems();
          return;
        }

        const decButton = event.target.closest('[data-dec-id]');
        if (decButton) {
          cart = store.changeItemQty(decButton.dataset.decId, -1);
          renderItems();
          return;
        }

        const removeButton = event.target.closest('[data-remove-id]');
        if (removeButton) {
          cart = store.removeItem(removeButton.dataset.removeId);
          renderItems();
        }
      });

      cartItemsElement.addEventListener('change', (event) => {
        const qtyInput = event.target.closest('[data-qty-input-id]');
        if (!qtyInput) return;

        cart = store.setItemQty(qtyInput.dataset.qtyInputId, qtyInput.value);
        renderItems();
      });

      window.addEventListener('cart:updated', () => {
        cart = store.readCart();
        updateBadge();
      });

      updateBadge();
      loadProducts();
    })();
  </script>

</body>
</html>
