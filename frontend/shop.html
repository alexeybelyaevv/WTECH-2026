<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L — Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .font-display { font-family: 'Montserrat', sans-serif; }
    .card { transition: box-shadow 0.2s ease; }
    .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.07); }
    input[type=range] { accent-color: #1a1a1a; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased">

  <!-- NAV -->
  <nav class="flex items-center justify-between px-4 sm:px-6 lg:px-8 py-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur z-50">
    <span class="text-2xl font-display font-bold tracking-tight">
      <a href="index.html">L</a>
    </span>
    <div class="flex items-center gap-3">
      <a href="login.html" title="Sign in">
      <button class="px-4 py-1.5 text-sm rounded border border-gray-300 hover:border-gray-700 transition-colors">Sign in</button>
      </a>
      <a href="register.html" title="Register">
      <button class="px-4 py-1.5 text-sm rounded bg-gray-900 text-white hover:bg-black transition-colors">Register</button>
      </a>
      <a href="cart.html" title="Cart">
      <button class="relative ml-1 p-1.5 rounded hover:bg-gray-100 transition-colors">
        <!-- Cart icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m12-9l2 9M9 21a1 1 0 100-2 1 1 0 000 2zm6 0a1 1 0 100-2 1 1 0 000 2z"/>
        </svg>
        <span id="cartCountBadge" class="hidden absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] min-w-4 h-4 px-1 rounded-full flex items-center justify-center font-medium">0</span>
      </button>
      </a>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Mobile filter toggle -->
    <div class="flex items-center justify-between mb-4 md:mb-6">
      <h1 class="text-lg font-display font-semibold tracking-tight">PC Game Store</h1>
      <button id="openFilters" class="md:hidden inline-flex items-center gap-2 px-4 py-2 rounded-full border border-gray-200 text-sm font-medium bg-white shadow-sm hover:border-gray-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h10M4 18h7"/>
        </svg>
        Filters
      </button>
    </div>

    <div class="lg:flex gap-6 relative">

      <!-- overlay for mobile -->
      <div id="filtersOverlay" class="hidden fixed inset-0 bg-black/40 z-30 md:hidden"></div>

      <!-- SIDEBAR FILTERS -->
      <aside id="filtersPanel" class="hidden md:block fixed inset-y-0 left-0 z-40 w-80 max-w-[90%] bg-white shadow-2xl transform -translate-x-full transition-transform duration-200 md:static md:w-60 md:shrink-0 md:bg-transparent md:shadow-none md:transform-none md:translate-x-0">
        <div class="h-full overflow-y-auto pt-20 pb-8 px-5 md:pt-0 md:px-0">
          <button data-close-filters class="md:hidden absolute top-3 right-3 w-9 h-9 rounded-full bg-gray-900 text-white flex items-center justify-center hover:bg-black transition-colors" title="Close filters">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>

          <div class="border border-gray-200 rounded-xl p-5 space-y-5">
            <div class="space-y-3">
              <label class="flex items-start gap-2.5 cursor-pointer">
                <input type="checkbox" checked class="mt-0.5 w-4 h-4 accent-gray-900 cursor-pointer"/>
                <div>
                  <p class="text-sm font-medium leading-tight">Game Keys</p>
                  <p class="text-xs text-gray-400 mt-0.5">Steam, EA, Rockstar</p>
                </div>
              </label>
              <label class="flex items-start gap-2.5 cursor-pointer">
                <input type="checkbox" checked class="mt-0.5 w-4 h-4 accent-gray-900 cursor-pointer"/>
                <div>
                  <p class="text-sm font-medium leading-tight">Subscriptions</p>
                  <p class="text-xs text-gray-400 mt-0.5">Monthly and 3-month plans</p>
                </div>
              </label>
              <label class="flex items-start gap-2.5 cursor-pointer">
                <input type="checkbox" checked class="mt-0.5 w-4 h-4 accent-gray-900 cursor-pointer"/>
                <div>
                  <p class="text-sm font-medium leading-tight">In-game Currency</p>
                  <p class="text-xs text-gray-400 mt-0.5">V-Bucks, VP, wallet top-up</p>
                </div>
              </label>
            </div>

            <div class="border-t border-gray-100"></div>

            <div>
              <div class="flex justify-between items-center mb-3">
                <span class="text-sm font-medium">Max price</span>
                <span class="text-xs text-gray-400">$0 - $80</span>
              </div>
              <input type="range" min="0" max="80" value="80" class="w-full h-1.5 rounded-full" title="Price range" />
            </div>

            <div class="border-t border-gray-100"></div>

            <div>
              <p class="text-sm font-medium mb-3">Platforms</p>
              <div class="space-y-2">
                <label class="flex items-center gap-2.5 cursor-pointer">
                  <input type="checkbox" checked class="w-4 h-4 accent-gray-900"/>
                  <span class="text-sm">Steam</span>
                </label>
                <label class="flex items-center gap-2.5 cursor-pointer">
                  <input type="checkbox" checked class="w-4 h-4 accent-gray-900"/>
                  <span class="text-sm">Epic Games</span>
                </label>
                <label class="flex items-center gap-2.5 cursor-pointer">
                  <input type="checkbox" checked class="w-4 h-4 accent-gray-900"/>
                  <span class="text-sm">Xbox / PC</span>
                </label>
              </div>
            </div>
          </div>

          <div class="md:hidden mt-6">
            <button data-close-filters class="w-full py-2.5 rounded-lg bg-gray-900 text-white text-sm font-semibold hover:bg-black transition-colors">Apply filters</button>
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <div class="flex-1">

        <!-- Search + Sort -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-3">
          <div class="flex items-center border border-gray-200 rounded-full px-4 py-2 gap-2 w-full sm:w-80">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/>
            </svg>
            <input id="searchInput" type="text" placeholder="Search game keys, subscriptions, currency" class="text-sm outline-none w-full placeholder-gray-400"/>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            <button data-sort="new" class="sort-btn px-4 py-1.5 rounded-full border border-gray-900 bg-gray-900 text-white text-sm font-medium">New</button>
            <button data-sort="price_asc" class="sort-btn px-4 py-1.5 rounded-full border border-gray-200 text-sm text-gray-600 hover:border-gray-400 transition-colors">Price ascending</button>
            <button data-sort="price_desc" class="sort-btn px-4 py-1.5 rounded-full border border-gray-200 text-sm text-gray-600 hover:border-gray-400 transition-colors">Price descending</button>
            <button data-sort="rating" class="sort-btn px-4 py-1.5 rounded-full border border-gray-200 text-sm text-gray-600 hover:border-gray-400 transition-colors">Rating</button>
          </div>
        </div>

        <!-- Product grid -->
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        <div id="noResults" class="hidden mt-8 border border-dashed border-gray-300 rounded-xl p-10 text-center text-sm text-gray-500">
          No products match your search query.
        </div>

        <!-- Pagination -->
        <div class="flex items-center justify-center gap-1.5 mt-10">
          <button class="w-8 h-8 rounded-full bg-gray-900 text-white text-sm font-medium flex items-center justify-center">1</button>
          <button class="w-8 h-8 rounded-full text-gray-600 text-sm hover:bg-gray-100 transition-colors flex items-center justify-center">2</button>
          <button class="w-8 h-8 rounded-full text-gray-600 text-sm hover:bg-gray-100 transition-colors flex items-center justify-center">3</button>
        </div>

      </div>
    </div>
  </div>

  <script src="store_data.js"></script>
  <script>
    (() => {
      const openBtn = document.getElementById('openFilters');
      const panel = document.getElementById('filtersPanel');
      const overlay = document.getElementById('filtersOverlay');
      const closers = document.querySelectorAll('[data-close-filters]');
      const mqDesktop = window.matchMedia('(min-width: 768px)');

      const open = () => {
        if (!panel) return;
        panel.classList.remove('hidden');
        overlay?.classList.remove('hidden');
        requestAnimationFrame(() => panel.classList.remove('-translate-x-full'));
        document.body.classList.add('overflow-hidden');
      };

      const close = () => {
        if (!panel) return;
        panel.classList.add('-translate-x-full');
        document.body.classList.remove('overflow-hidden');
        setTimeout(() => {
          if (!mqDesktop.matches) {
            panel.classList.add('hidden');
            overlay?.classList.add('hidden');
          }
        }, 200);
      };

      openBtn?.addEventListener('click', open);
      overlay?.addEventListener('click', close);
      closers.forEach((btn) => btn.addEventListener('click', close));

      mqDesktop.addEventListener('change', (event) => {
        if (event.matches) {
          panel?.classList.remove('hidden', '-translate-x-full');
          overlay?.classList.add('hidden');
          document.body.classList.remove('overflow-hidden');
        } else {
          panel?.classList.add('hidden');
          panel?.classList.add('-translate-x-full');
        }
      });
    })();

    (() => {
      const store = window.StoreMvp;
      if (!store) return;

      const { CATALOG, addItem, formatMoney, getCartCount, readCart } = store;

      const productGrid = document.getElementById('productGrid');
      const noResults = document.getElementById('noResults');
      const searchInput = document.getElementById('searchInput');
      const sortButtons = Array.from(document.querySelectorAll('.sort-btn'));
      const cartCountBadge = document.getElementById('cartCountBadge');

      const catalogWithOrder = CATALOG.map((product, index) => ({ ...product, order: index }));
      let query = '';
      let sortBy = 'new';

      const escapeHtml = (value) => {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      };

      const updateBadge = () => {
        const count = getCartCount(readCart());
        cartCountBadge.textContent = count > 99 ? '99+' : String(count);
        cartCountBadge.classList.toggle('hidden', count === 0);
      };

      const applySort = (items) => {
        return items.sort((a, b) => {
          if (sortBy === 'price_asc') return a.price - b.price;
          if (sortBy === 'price_desc') return b.price - a.price;
          if (sortBy === 'rating') return b.rating - a.rating;
          return a.order - b.order;
        });
      };

      const getFilteredProducts = () => {
        const q = query.trim().toLowerCase();
        const items = catalogWithOrder.filter((product) => {
          if (!q) return true;
          return [product.name, product.category, product.platform, product.description]
            .join(' ')
            .toLowerCase()
            .includes(q);
        });

        return applySort(items);
      };

      const tagClass = (category) => {
        if (category === 'Game Key') return 'bg-emerald-50 text-emerald-700 border border-emerald-200';
        if (category === 'Subscription') return 'bg-sky-50 text-sky-700 border border-sky-200';
        return 'bg-amber-50 text-amber-700 border border-amber-200';
      };

      const renderProducts = () => {
        const products = getFilteredProducts();
        noResults.classList.toggle('hidden', products.length > 0);

        if (products.length === 0) {
          productGrid.innerHTML = '';
          return;
        }

        const html = products
          .map((product) => {
            const oldPrice = product.oldPrice > product.price
              ? `<span class="text-xs text-gray-400 line-through">${formatMoney(product.oldPrice)}</span>`
              : '';

            return `
              <article class="card border border-gray-200 rounded-xl overflow-hidden flex flex-col bg-white">
                <a href="product_details.html?id=${escapeHtml(product.id)}" class="block">
                  <div class="bg-gradient-to-br from-gray-50 to-gray-100 aspect-[4/3] overflow-hidden">
                    <img src="${escapeHtml(product.image || '')}" alt="${escapeHtml(product.name)} cover" class="w-full h-full object-cover" loading="lazy"/>
                  </div>
                </a>
                <div class="p-4 flex flex-col gap-2 flex-1">
                  <div class="flex items-center justify-between gap-2">
                    <span class="px-2 py-0.5 rounded-full text-[11px] font-medium ${tagClass(product.category)}">${escapeHtml(product.category)}</span>
                    <span class="text-xs text-gray-500">Rating ${product.rating.toFixed(1)}</span>
                  </div>
                  <a href="product_details.html?id=${escapeHtml(product.id)}" class="block">
                    <h3 class="text-sm font-semibold leading-snug text-gray-900">${escapeHtml(product.name)}</h3>
                  </a>
                  <p class="text-xs text-gray-400">${escapeHtml(product.platform)}</p>
                  <p class="text-xs text-gray-500 leading-relaxed">${escapeHtml(product.description)}</p>
                  <div class="mt-auto flex items-end justify-between gap-3 pt-2">
                    <div>
                      <p class="text-sm font-semibold text-gray-900">${formatMoney(product.price)}</p>
                      ${oldPrice}
                    </div>
                    <button data-add-id="${escapeHtml(product.id)}" class="px-3 py-2 rounded-lg bg-gray-900 text-white text-xs font-semibold hover:bg-black transition-colors">Add to cart</button>
                  </div>
                </div>
              </article>
            `;
          })
          .join('');

        productGrid.innerHTML = html;
      };

      const updateSortStyles = () => {
        sortButtons.forEach((button) => {
          const isActive = button.dataset.sort === sortBy;
          button.classList.toggle('bg-gray-900', isActive);
          button.classList.toggle('text-white', isActive);
          button.classList.toggle('border-gray-900', isActive);
          button.classList.toggle('border-gray-200', !isActive);
          button.classList.toggle('text-gray-600', !isActive);
        });
      };

      productGrid.addEventListener('click', (event) => {
        const button = event.target.closest('[data-add-id]');
        if (!button) return;

        addItem(button.dataset.addId, 1);
        updateBadge();

        const originalLabel = button.textContent;
        button.textContent = 'Added';
        button.disabled = true;

        window.setTimeout(() => {
          button.textContent = originalLabel;
          button.disabled = false;
        }, 700);
      });

      searchInput?.addEventListener('input', (event) => {
        query = event.target.value || '';
        renderProducts();
      });

      sortButtons.forEach((button) => {
        button.addEventListener('click', () => {
          sortBy = button.dataset.sort || 'new';
          updateSortStyles();
          renderProducts();
        });
      });

      window.addEventListener('cart:updated', updateBadge);

      updateSortStyles();
      renderProducts();
      updateBadge();
    })();
  </script>

</body>
</html>
