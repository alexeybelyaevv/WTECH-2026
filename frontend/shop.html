<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L — Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    .card { transition: box-shadow 0.2s ease; }
    .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.07); }
    input[type=range] { accent-color: #1a1a1a; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased">

  <!-- NAV -->
  <nav class="flex items-center justify-between px-8 py-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur z-50">
    <span class="text-2xl font-display font-bold tracking-tight">L</span>
    <div class="flex items-center gap-3">
      <button class="px-4 py-1.5 text-sm rounded border border-gray-300 hover:border-gray-700 transition-colors">Sign in</button>
      <button class="px-4 py-1.5 text-sm rounded bg-gray-900 text-white hover:bg-black transition-colors">Register</button>
      <button class="relative ml-1 p-1.5 rounded hover:bg-gray-100 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m12-9l2 9M9 21a1 1 0 100-2 1 1 0 000 2zm6 0a1 1 0 100-2 1 1 0 000 2z"/>
        </svg>
        <span class="absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-medium">2</span>
      </button>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="flex gap-6 px-8 py-8 max-w-7xl mx-auto">

    <!-- SIDEBAR FILTERS -->
    <aside class="w-60 shrink-0">
      <div class="border border-gray-200 rounded-xl p-5 space-y-5">

        <!-- Availability -->
        <div class="space-y-3">
          <label class="flex items-start gap-2.5 cursor-pointer">
            <input type="checkbox" checked class="mt-0.5 w-4 h-4 accent-gray-900 cursor-pointer"/>
            <div>
              <p class="text-sm font-medium leading-tight">In shop</p>
              <p class="text-xs text-gray-400 mt-0.5">Description</p>
            </div>
          </label>
          <label class="flex items-start gap-2.5 cursor-pointer">
            <input type="checkbox" checked class="mt-0.5 w-4 h-4 accent-gray-900 cursor-pointer"/>
            <div>
              <p class="text-sm font-medium leading-tight">In Stock</p>
              <p class="text-xs text-gray-400 mt-0.5">Description</p>
            </div>
          </label>
          <label class="flex items-start gap-2.5 cursor-pointer">
            <input type="checkbox" checked class="mt-0.5 w-4 h-4 accent-gray-900 cursor-pointer"/>
            <div>
              <p class="text-sm font-medium leading-tight">Not in stock</p>
              <p class="text-xs text-gray-400 mt-0.5">Description</p>
            </div>
          </label>
        </div>

        <div class="border-t border-gray-100"></div>

        <!-- Price range -->
        <div>
          <div class="flex justify-between items-center mb-3">
            <span class="text-sm font-medium">Label</span>
            <span class="text-xs text-gray-400">$0-100</span>
          </div>
          <input type="range" min="0" max="100" value="100" class="w-full h-1.5 rounded-full"/>
        </div>

        <div class="border-t border-gray-100"></div>

        <!-- Color -->
        <div>
          <p class="text-sm font-medium mb-3">Color</p>
          <div class="space-y-2">
            <label class="flex items-center gap-2.5 cursor-pointer">
              <input type="checkbox" checked class="w-4 h-4 accent-gray-900"/>
              <span class="text-sm">Label</span>
            </label>
            <label class="flex items-center gap-2.5 cursor-pointer">
              <input type="checkbox" checked class="w-4 h-4 accent-gray-900"/>
              <span class="text-sm">Label</span>
            </label>
            <label class="flex items-center gap-2.5 cursor-pointer">
              <input type="checkbox" checked class="w-4 h-4 accent-gray-900"/>
              <span class="text-sm">Label</span>
            </label>
          </div>
        </div>

        <div class="border-t border-gray-100"></div>

        <!-- Size -->
        <div>
          <p class="text-sm font-medium mb-3">Size</p>
          <div class="space-y-2">
            <label class="flex items-center gap-2.5 cursor-pointer">
              <input type="checkbox" checked class="w-4 h-4 accent-gray-900"/>
              <span class="text-sm">Label</span>
            </label>
            <label class="flex items-center gap-2.5 cursor-pointer">
              <input type="checkbox" checked class="w-4 h-4 accent-gray-900"/>
              <span class="text-sm">Label</span>
            </label>
            <label class="flex items-center gap-2.5 cursor-pointer">
              <input type="checkbox" checked class="w-4 h-4 accent-gray-900"/>
              <span class="text-sm">Label</span>
            </label>
          </div>
        </div>

      </div>
    </aside>

    <!-- MAIN -->
    <div class="flex-1">

      <!-- Search + Sort -->
      <div class="flex items-center justify-between mb-6 gap-4">
        <div class="flex items-center border border-gray-200 rounded-full px-4 py-2 gap-2 w-56">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/>
          </svg>
          <input type="text" placeholder="Search" class="text-sm outline-none w-full placeholder-gray-400"/>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          <button class="flex items-center gap-1.5 px-4 py-1.5 rounded-full bg-gray-900 text-white text-sm font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            New
          </button>
          <button class="px-4 py-1.5 rounded-full border border-gray-200 text-sm text-gray-600 hover:border-gray-400 transition-colors">Price ascending</button>
          <button class="px-4 py-1.5 rounded-full border border-gray-200 text-sm text-gray-600 hover:border-gray-400 transition-colors">Price descending</button>
          <button class="px-4 py-1.5 rounded-full border border-gray-200 text-sm text-gray-600 hover:border-gray-400 transition-colors">Rating</button>
        </div>
      </div>

      <!-- Product grid -->
      <div class="grid grid-cols-3 gap-4">

        <!-- Product card -->
        <div class="card border border-gray-200 rounded-xl overflow-hidden cursor-pointer">
          <div class="bg-gray-100 aspect-[4/3] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
          <div class="p-4">
            <p class="text-sm text-gray-700">Text</p>
            <p class="text-sm font-semibold mt-1">$0</p>
          </div>
        </div>

        <div class="card border border-gray-200 rounded-xl overflow-hidden cursor-pointer">
          <div class="bg-gray-100 aspect-[4/3] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
          <div class="p-4">
            <p class="text-sm text-gray-700">Text</p>
            <p class="text-sm font-semibold mt-1">$0</p>
          </div>
        </div>

        <div class="card border border-gray-200 rounded-xl overflow-hidden cursor-pointer">
          <div class="bg-gray-100 aspect-[4/3] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
          <div class="p-4">
            <p class="text-sm text-gray-700">Text</p>
            <p class="text-sm font-semibold mt-1">$0</p>
          </div>
        </div>

        <div class="card border border-gray-200 rounded-xl overflow-hidden cursor-pointer">
          <div class="bg-gray-100 aspect-[4/3] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
          <div class="p-4">
            <p class="text-sm text-gray-700">Text</p>
            <p class="text-sm font-semibold mt-1">$0</p>
          </div>
        </div>

        <div class="card border border-gray-200 rounded-xl overflow-hidden cursor-pointer">
          <div class="bg-gray-100 aspect-[4/3] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
          <div class="p-4">
            <p class="text-sm text-gray-700">Text</p>
            <p class="text-sm font-semibold mt-1">$0</p>
          </div>
        </div>

        <div class="card border border-gray-200 rounded-xl overflow-hidden cursor-pointer">
          <div class="bg-gray-100 aspect-[4/3] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
          <div class="p-4">
            <p class="text-sm text-gray-700">Text</p>
            <p class="text-sm font-semibold mt-1">$0</p>
          </div>
        </div>

      </div>

      <!-- Pagination -->
      <div class="flex items-center justify-center gap-1.5 mt-10">
        <button class="w-8 h-8 rounded-full bg-gray-900 text-white text-sm font-medium flex items-center justify-center">1</button>
        <button class="w-8 h-8 rounded-full text-gray-600 text-sm hover:bg-gray-100 transition-colors flex items-center justify-center">2</button>
        <button class="w-8 h-8 rounded-full text-gray-600 text-sm hover:bg-gray-100 transition-colors flex items-center justify-center">3</button>
        <span class="w-8 h-8 flex items-center justify-center text-gray-400 text-sm">…</span>
        <button class="w-8 h-8 rounded-full text-gray-600 text-sm hover:bg-gray-100 transition-colors flex items-center justify-center">67</button>
        <button class="w-8 h-8 rounded-full text-gray-600 text-sm hover:bg-gray-100 transition-colors flex items-center justify-center">68</button>
      </div>

    </div>
  </div>

</body>
</html>
