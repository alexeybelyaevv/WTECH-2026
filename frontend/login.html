<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-8">Welcome Back!</h1>

    <div class="space-y-4">
      <!-- Email -->
      <div>
        <label class="block text-sm text-gray-600 mb-1.5">Email</label>
        <input
          type="email"
          placeholder="example@gmail.com"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm placeholder-gray-300 focus:outline-none focus:border-gray-400 transition-colors"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm text-gray-600 mb-1.5">Password</label>
        <div class="relative">
          <input
            type="password"
            placeholder="Enter Your Password"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm placeholder-gray-300 focus:outline-none focus:border-gray-400 transition-colors pr-11"
          />
          <button class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Remember + Forgot -->
      <div class="flex items-center justify-between pt-1">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" checked class="w-4 h-4 accent-gray-900 rounded"/>
          <span class="text-sm text-gray-700">Remember Me</span>
        </label>
        <a href="#" class="text-sm text-red-400 hover:text-red-500 transition-colors">Forgot Password?</a>
      </div>

      <!-- Login button -->
      <button class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold transition-colors mt-2">
        Login
      </button>

      <!-- Sign Up link -->
      <p class="text-center text-sm text-gray-500 pt-1">
        Don't have an account ?
        <a href="register.html" class="text-blue-600 hover:text-blue-700 font-medium transition-colors">Sign Up</a>
      </p>
    </div>
  </div>

</body>
</html>
