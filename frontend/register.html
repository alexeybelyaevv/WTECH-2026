<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L — Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-8">Create an account</h1>

    <div class="space-y-3">
      <!-- Username -->
      <input
        type="text"
        placeholder="Enter Your Username"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm placeholder-gray-300 focus:outline-none focus:border-gray-400 transition-colors"
      />

      <!-- Email -->
      <input
        type="email"
        placeholder="Enter Your Email"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm placeholder-gray-300 focus:outline-none focus:border-gray-400 transition-colors"
      />

      <!-- Phone -->
      <input
        type="tel"
        placeholder="Enter Your Phone Number"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm placeholder-gray-300 focus:outline-none focus:border-gray-400 transition-colors"
      />

      <!-- Password -->
      <div class="relative">
        <input
          type="password"
          placeholder="Enter Your Password"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm placeholder-gray-300 focus:outline-none focus:border-gray-400 transition-colors pr-11"
        />
        <button class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-300 hover:text-gray-500 transition-colors" title="Show password">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
          </svg>
        </button>
      </div>

      <!-- Sign Up button -->
      <a href="index.html">
        <button class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold transition-colors mt-1">
          Sign Up
        </button>
      </a>

      <!-- Login link -->
      <p class="text-center text-sm text-gray-500 pt-1">
        <span class="underline underline-offset-2">Already have an account?</span>
        <a href="login.html" class="text-blue-600 hover:text-blue-700 font-medium transition-colors ml-1">Login</a>
      </p>
    </div>
  </div>

</body>
</html>
