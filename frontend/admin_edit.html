<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L — Edit Product</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .font-display { font-family: 'Montserrat', sans-serif; }
    .image-remove-active { border-color: #ef4444; background-color: #fef2f2; color: #b91c1c; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased">

  <nav class="flex items-center justify-between px-8 py-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur z-50">
    <span class="text-2xl font-display font-bold tracking-tight">
      <a href="index.html">L</a>
    </span>
    <div class="flex items-center gap-3">
      <a href="admin_manage.html">
        <button class="px-4 py-1.5 text-sm rounded border border-gray-300 hover:border-gray-700 transition-colors">Product management</button>
      </a>
      <a href="admin_new.html">
        <button class="px-4 py-1.5 text-sm rounded border border-gray-300 hover:border-gray-700 transition-colors">New product</button>
      </a>
      <a href="admin_edit.html">
        <button class="px-4 py-1.5 text-sm rounded bg-gray-900 text-white hover:bg-black transition-colors">Edit product</button>
      </a>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-10 pb-32">
    <div class="mb-8">
      <h1 class="text-2xl font-bold">Edit product</h1>
      <p id="productSlugLabel" class="text-sm text-gray-500 mt-1">Loading product...</p>
    </div>

    <div id="formMessage" class="hidden mb-6 rounded-2xl border px-4 py-3 text-sm"></div>

    <form id="productForm" class="space-y-6 hidden">
      <section class="border border-gray-200 rounded-2xl p-5">
        <h2 class="text-sm font-semibold mb-4">Main information</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="sm:col-span-2">
            <label for="nameInput" class="block text-sm text-gray-600 mb-1.5">Name</label>
            <input id="nameInput" type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors"/>
          </div>
          <div class="sm:col-span-2">
            <label for="descriptionInput" class="block text-sm text-gray-600 mb-1.5">Description</label>
            <textarea id="descriptionInput" rows="5" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors resize-y"></textarea>
          </div>
          <div>
            <label for="typeInput" class="block text-sm text-gray-600 mb-1.5">Type</label>
            <select id="typeInput" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors bg-white">
              <option value="DIGITAL">Digital</option>
              <option value="PHYSICAL">Physical</option>
            </select>
          </div>
          <div>
            <label for="priceInput" class="block text-sm text-gray-600 mb-1.5">Price (EUR)</label>
            <input id="priceInput" type="number" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors"/>
          </div>
          <div>
            <label for="stockInput" class="block text-sm text-gray-600 mb-1.5">Stock</label>
            <input id="stockInput" type="number" min="0" step="1" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors"/>
          </div>
          <div class="flex items-center gap-3 pt-8">
            <input id="activeInput" type="checkbox" class="w-4 h-4 accent-gray-900"/>
            <label for="activeInput" class="text-sm text-gray-700">Visible in storefront</label>
          </div>
        </div>
      </section>

      <section class="border border-gray-200 rounded-2xl p-5">
        <h2 class="text-sm font-semibold mb-4">References</h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div>
            <p class="text-sm text-gray-600 mb-3">Categories</p>
            <div id="categoryOptions" class="space-y-2 text-sm text-gray-700"></div>
          </div>
          <div>
            <p class="text-sm text-gray-600 mb-3">Platforms</p>
            <div id="platformOptions" class="space-y-2 text-sm text-gray-700"></div>
          </div>
        </div>
      </section>

      <section class="border border-gray-200 rounded-2xl p-5">
        <h2 class="text-sm font-semibold mb-4">Existing images</h2>
        <p class="text-xs text-gray-500 mb-4">Click "Mark for removal" to remove an image on save.</p>
        <div id="existingImages" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
      </section>

      <section class="border border-gray-200 rounded-2xl p-5">
        <h2 class="text-sm font-semibold mb-4">Add new images</h2>
        <label for="imagesInput" class="inline-flex items-center justify-center px-4 py-3 rounded-xl border border-gray-200 text-sm font-medium text-gray-700 hover:border-gray-400 transition-colors cursor-pointer">
          Select additional images
        </label>
        <input id="imagesInput" type="file" accept="image/png,image/jpeg,image/webp" multiple class="hidden"/>
        <div id="newImagePreview" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4"></div>
      </section>
    </form>

    <div id="missingState" class="hidden text-center py-20">
      <h2 class="text-3xl font-bold">Product not found</h2>
      <p class="text-sm text-gray-500 mt-3">The product id is missing or the item no longer exists.</p>
      <a href="admin_manage.html" class="inline-flex mt-6 px-6 py-3 rounded-xl bg-gray-900 text-white text-sm font-semibold hover:bg-black transition-colors">Back to products</a>
    </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 px-6 pb-6 bg-white pt-2 border-t border-gray-100">
    <div class="max-w-4xl mx-auto flex flex-col sm:flex-row gap-3">
      <a href="admin_manage.html" class="flex-1 inline-flex items-center justify-center py-4 rounded-xl border border-gray-200 text-sm font-semibold text-gray-700 hover:border-gray-400 transition-colors">Back</a>
      <button id="submitButton" form="productForm" type="submit" class="flex-1 py-4 bg-gray-900 text-white text-sm font-semibold rounded-xl hover:bg-black transition-colors">
        Save changes
      </button>
    </div>
  </div>

  <script src="store_data.js"></script>
  <script>
    (() => {
      const store = window.StoreMvp;
      if (!store) return;

      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');

      const productForm = document.getElementById('productForm');
      const missingState = document.getElementById('missingState');
      const formMessage = document.getElementById('formMessage');
      const categoryOptions = document.getElementById('categoryOptions');
      const platformOptions = document.getElementById('platformOptions');
      const existingImages = document.getElementById('existingImages');
      const imagesInput = document.getElementById('imagesInput');
      const newImagePreview = document.getElementById('newImagePreview');
      const submitButton = document.getElementById('submitButton');
      const productSlugLabel = document.getElementById('productSlugLabel');

      const nameInput = document.getElementById('nameInput');
      const descriptionInput = document.getElementById('descriptionInput');
      const typeInput = document.getElementById('typeInput');
      const priceInput = document.getElementById('priceInput');
      const stockInput = document.getElementById('stockInput');
      const activeInput = document.getElementById('activeInput');

      let product = null;
      let references = null;
      const removedImageIds = new Set();

      const setMessage = (text, type = 'error') => {
        if (!text) {
          formMessage.textContent = '';
          formMessage.className = 'hidden mb-6 rounded-2xl border px-4 py-3 text-sm';
          return;
        }

        formMessage.textContent = text;
        formMessage.className =
          type === 'success'
            ? 'mb-6 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800'
            : type === 'info'
              ? 'mb-6 rounded-2xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-sky-800'
              : 'mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700';
      };

      const setLoading = (isLoading) => {
        submitButton.disabled = isLoading;
        submitButton.textContent = isLoading ? 'Saving changes...' : 'Save changes';
        submitButton.classList.toggle('opacity-60', isLoading);
        submitButton.classList.toggle('cursor-not-allowed', isLoading);
      };

      const renderReferenceGroup = (container, name, items, selectedIds) => {
        container.innerHTML = items.map((item) => `
          <label class="flex items-center gap-2.5 cursor-pointer">
            <input type="checkbox" name="${name}" value="${item.id}" ${selectedIds.has(item.id) ? 'checked' : ''} class="w-4 h-4 accent-gray-900"/>
            <span>${store.escapeHtml(item.name)}</span>
          </label>
        `).join('');
      };

      const renderExistingImages = () => {
        const images = product?.images || [];

        if (images.length === 0) {
          existingImages.innerHTML = '<p class="text-sm text-gray-400 col-span-full">No existing images found.</p>';
          return;
        }

        existingImages.innerHTML = images.map((image) => {
          const marked = removedImageIds.has(image.id);

          return `
            <article class="rounded-2xl overflow-hidden border border-gray-200 bg-white">
              <img src="${image.url || store.productImage(image, product?.name || 'Product')}" alt="${store.escapeHtml(image.alt || product?.name || 'Product')}" class="w-full h-28 object-cover"/>
              <div class="p-3">
                <p class="text-xs text-gray-500 truncate">${store.escapeHtml(image.alt || `Image #${image.id}`)}</p>
                <button
                  type="button"
                  data-image-id="${image.id}"
                  class="mt-3 w-full px-3 py-2 rounded-lg border text-xs font-semibold transition-colors ${marked ? 'image-remove-active border-red-200' : 'border-gray-200 text-gray-700 hover:border-gray-400'}"
                >
                  ${marked ? 'Undo removal' : 'Mark for removal'}
                </button>
              </div>
            </article>
          `;
        }).join('');
      };

      const renderNewImagePreview = () => {
        const files = Array.from(imagesInput.files || []);

        if (files.length === 0) {
          newImagePreview.innerHTML = '<p class="text-sm text-gray-400 col-span-full">No new images selected.</p>';
          return;
        }

        newImagePreview.innerHTML = files.map((file) => `
          <div class="rounded-2xl overflow-hidden border border-gray-200 bg-gray-50">
            <img src="${URL.createObjectURL(file)}" alt="${store.escapeHtml(file.name)}" class="w-full h-28 object-cover"/>
            <div class="px-3 py-2 text-xs text-gray-500 truncate">${store.escapeHtml(file.name)}</div>
          </div>
        `).join('');
      };

      const selectedIds = (name) => {
        return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`))
          .map((input) => input.value)
          .filter(Boolean);
      };

      const populateForm = () => {
        if (!product || !references) return;

        productSlugLabel.textContent = product.slug;
        nameInput.value = product.name || '';
        descriptionInput.value = product.description || '';
        typeInput.value = product.type || 'DIGITAL';
        priceInput.value = product.price ?? '';
        stockInput.value = product.stock ?? 0;
        activeInput.checked = Boolean(product.is_active);

        renderReferenceGroup(
          categoryOptions,
          'category_ids',
          references.categories || [],
          new Set((product.categories || []).map((item) => item.id).filter(Boolean)),
        );

        renderReferenceGroup(
          platformOptions,
          'platform_ids',
          references.platforms || [],
          new Set((product.platforms || []).map((item) => item.id).filter(Boolean)),
        );

        renderExistingImages();
        renderNewImagePreview();
        productForm.classList.remove('hidden');
        missingState.classList.add('hidden');
      };

      const buildFormData = () => {
        const categoryIds = selectedIds('category_ids');
        const platformIds = selectedIds('platform_ids');
        const files = Array.from(imagesInput.files || []);

        if (categoryIds.length === 0) {
          throw new Error('Select at least one category.');
        }
        if (platformIds.length === 0) {
          throw new Error('Select at least one platform.');
        }

        const formData = new FormData();
        formData.append('name', nameInput.value.trim());
        formData.append('description', descriptionInput.value.trim());
        formData.append('type', typeInput.value);
        formData.append('price', priceInput.value);
        formData.append('stock', stockInput.value);
        formData.append('is_active', activeInput.checked ? '1' : '0');

        categoryIds.forEach((id) => formData.append('category_ids[]', id));
        platformIds.forEach((id) => formData.append('platform_ids[]', id));
        Array.from(removedImageIds).forEach((id) => formData.append('remove_image_ids[]', id));
        files.forEach((file) => formData.append('images[]', file));

        return formData;
      };

      existingImages.addEventListener('click', (event) => {
        const button = event.target.closest('[data-image-id]');
        if (!button) return;

        const imageId = Number(button.dataset.imageId || '0');
        if (!imageId) return;

        if (removedImageIds.has(imageId)) {
          removedImageIds.delete(imageId);
        } else {
          removedImageIds.add(imageId);
        }

        renderExistingImages();
      });

      imagesInput.addEventListener('change', renderNewImagePreview);

      productForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        setMessage('');

        let formData;

        try {
          formData = buildFormData();
        } catch (error) {
          setMessage(error.message);
          return;
        }

        setLoading(true);

        try {
          const response = await store.updateAdminProduct(productId, formData);
          product = response?.data;
          removedImageIds.clear();
          imagesInput.value = '';
          populateForm();
          setMessage('Product updated successfully.', 'success');
        } catch (error) {
          setMessage(store.firstError(error.payload, 'Unable to update product right now.'));
        } finally {
          setLoading(false);
        }
      });

      const loadPage = async () => {
        if (!productId) {
          missingState.classList.remove('hidden');
          productSlugLabel.textContent = 'Missing product id';
          return;
        }

        setMessage('Loading product...', 'info');

        try {
          const [productPayload, referencesPayload] = await Promise.all([
            store.fetchAdminProduct(productId),
            store.fetchAdminReferences(),
          ]);

          product = productPayload?.data;
          references = referencesPayload;

          if (!product) {
            throw new Error('Product not found.');
          }

          populateForm();
          setMessage('');
        } catch (error) {
          if (error.status === 404) {
            missingState.classList.remove('hidden');
            productForm.classList.add('hidden');
            productSlugLabel.textContent = 'Product not found';
            setMessage('');
            return;
          }

          setMessage(store.firstError(error.payload, error.message || 'Unable to load product.'));
        }
      };

      loadPage();
    })();
  </script>

</body>
</html>
