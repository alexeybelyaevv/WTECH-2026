<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L — Product</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }

<body class="bg-white text-gray-900 antialiased">

  <!-- NAV -->
  <nav class="flex items-center justify-between px-4 sm:px-6 lg:px-8 py-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur z-50">
    <span class="text-2xl font-display font-bold tracking-tight">
      <a href="index.html">L</a>
    </span>
    <div class="flex items-center gap-3">
      <a href="login.html" title="Sign in">
        <button class="px-4 py-1.5 text-sm rounded border border-gray-300 hover:border-gray-700 transition-colors">Sign in</button>
      </a>
      <a href="register.html" title="Register">
        <button class="px-4 py-1.5 text-sm rounded bg-gray-900 text-white hover:bg-black transition-colors">Register</button>
      </a>
      <a href="cart.html" title="Cart">
        <button class="relative ml-1 p-1.5 rounded hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m12-9l2 9M9 21a1 1 0 100-2 1 1 0 000 2zm6 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span class="absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-medium">2</span>
        </button>
      </a>
    </div>
  </nav>

  <!-- PRODUCT -->
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="flex flex-col lg:flex-row gap-8 lg:gap-12 items-start">

      <!-- Image -->

        <div class="w-full aspect-square bg-gray-100 rounded-2xl flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-20 h-20 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="0.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>
        <button class="absolute top-3 left-3 w-9 h-9 bg-gray-800 rounded-full flex items-center justify-center hover:bg-gray-700 transition-colors" title="Add to favorites">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5 text-white" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
        </button>
      </div>

      <!-- Info -->
      <div class="flex-1 w-full pt-1 space-y-4 text-center lg:text-left">
        <div class="space-y-2">
          <h1 class="text-2xl font-bold">Text Heading</h1>
          <span class="inline-block px-3 py-0.5 rounded-full bg-green-100 text-green-700 text-xs font-medium">Tag</span>
        </div>

        <div class="flex items-baseline gap-1 justify-center lg:justify-start">
          <span class="text-2xl text-gray-400 font-light">$</span>
          <span class="text-5xl font-bold tracking-tight">50</span>
        </div>

        <p class="text-sm text-gray-500 max-w-2xl mx-auto lg:mx-0">Text</p>

        <!-- Size + Colour -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Size</label>
            <select class="w-full px-3 py-2.5 rounded-lg border border-gray-200 text-sm text-gray-600 focus:outline-none focus:border-gray-400 transition-colors pr-8" title="Select size">
              <option>Value</option>
              <option>S</option>
              <option>M</option>
              <option>L</option>
              <option>XL</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Colour</label>
            <select class="w-full px-3 py-2.5 rounded-lg border border-gray-200 text-sm text-gray-600 focus:outline-none focus:border-gray-400 transition-colors pr-8" title="Select colour">
              <option>Value</option>
              <option>Black</option>
              <option>White</option>
              <option>Grey</option>
            </select>
          </div>
        </div>

        <!-- CTA -->
        <div class="flex flex-col sm:flex-row sm:items-center gap-3">
          <button class="w-full sm:w-auto sm:px-10 py-3.5 bg-gray-900 text-white text-sm font-semibold rounded-xl hover:bg-black transition-colors">
            Button
          </button>
        </div>

        <!-- FAQ accordion -->
        <div class="border border-gray-200 rounded-xl overflow-hidden">
          <div class="flex items-center justify-between px-4 py-3.5 cursor-pointer">
            <span class="text-sm font-semibold">Title</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

            </svg>
          </div>
          <div class="px-4 pb-4 border-t border-gray-100">
            <p class="text-sm text-gray-500 mt-3 leading-relaxed">Answer the frequently asked question in a simple sentence, a longish paragraph, or even in a list.</p>
          </div>
        </div>
      </div>
    </div>
